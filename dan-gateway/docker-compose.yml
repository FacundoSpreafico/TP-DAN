services:
  gateway-server:
    image: ms-gateway:latest
    container_name: ms-gateway
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    networks:
      - backend-net
    
networks:
  backend-net:
    external: true