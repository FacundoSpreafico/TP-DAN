<!DOCTYPE html>
<html lang="en">
<head>
    <title>MS Login</title>
    <link rel="stylesheet" type="text/css" href="css/login.css">
    <h1>Login</h1>
    <script src="public/login.js" defer></script>
</head>
<body>
<main>
<div class="login-box">
    <form id ="login-form">
        <label for="">Username</label>
        <input type="text" name="username" id= "user" placeholder="Username" required>
        <label for="">Password</label>
        <input type="password" name="password" id="pw" placeholder="Password" required>
        <button type="submit" class="btn" value="Login">Iniciar sesion</button>
    </form>
</div>
</main>   

</body>
</html>
