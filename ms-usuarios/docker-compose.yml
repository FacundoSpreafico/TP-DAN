services:
   mysql:
    image: mysql:8.0
    container_name: mysql-db-usuarios
    environment:
      MYSQL_ROOT_PASSWORD: danrootpassword
      MYSQL_DATABASE: dandb-usuarios
      MYSQL_USER: danuser
      MYSQL_PASSWORD: danpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - usuarios-net

   phpmyadmin-dan:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-container-usuarios
    environment:
      PMA_HOST: mysql-db-usuarios
      PMA_USER: danuser
      PMA_PASSWORD: danpassword
    ports:
      - "8086:80"
    depends_on:
      - mysql
    networks:
      - usuarios-net

   ms-usuarios:
    image: ms-usuarios:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db-usuarios:3306/dandb-usuarios
      SPRING_DATASOURCE_USERNAME: danuser
      SPRING_DATASOURCE_PASSWORD: danpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
    ports:
      - "6080:8080"
    depends_on:
      - mysql
    networks:
      - usuarios-net
      - backend-net
    
networks:
  backend-net:
    external: true
  usuarios-net:
    driver: bridge

volumes:
  mysql-data:
